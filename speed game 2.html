<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeMaster Pro - Advanced Typing Speed Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #333;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            max-width: 1000px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .title {
            font-size: 2.5em;
            font-weight: 700;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn.secondary {
            background: linear-gradient(45deg, #f093fb, #f5576c);
        }

        .btn.tertiary {
            background: linear-gradient(45deg, #4facfe, #00f2fe);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.8);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9em;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .text-display {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 20px;
            font-size: 1.2em;
            line-height: 1.8;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            border: 2px solid rgba(102, 126, 234, 0.2);
            min-height: 150px;
            position: relative;
            overflow-wrap: break-word;
        }

        .char {
            position: relative;
            transition: all 0.15s ease;
        }

        .char.correct {
            background-color: rgba(76, 175, 80, 0.3);
            color: #2e7d32;
        }

        .char.incorrect {
            background-color: rgba(244, 67, 54, 0.3);
            color: #c62828;
            animation: shake 0.3s ease-in-out;
        }

        .char.current {
            background-color: rgba(102, 126, 234, 0.4);
            animation: pulse 1s infinite;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-2px); }
            75% { transform: translateX(2px); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .input-area {
            width: 100%;
            padding: 20px;
            font-size: 1.1em;
            border: 2px solid rgba(102, 126, 234, 0.3);
            border-radius: 12px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            background: rgba(255, 255, 255, 0.9);
            transition: all 0.3s ease;
            margin-bottom: 20px;
            resize: none;
        }

        .input-area:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
        }

        .leaderboard {
            background: rgba(255, 255, 255, 0.9);
            padding: 25px;
            border-radius: 15px;
            margin-top: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .leaderboard h3 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
            text-align: center;
        }

        .leaderboard-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 10px;
            border-left: 4px solid #667eea;
            transition: transform 0.2s ease;
        }

        .leaderboard-entry:hover {
            transform: translateX(5px);
        }

        .leaderboard-entry.new {
            animation: highlight 2s ease-in-out;
        }

        @keyframes highlight {
            0%, 100% { background: rgba(255, 255, 255, 0.7); }
            50% { background: rgba(102, 126, 234, 0.2); }
        }

        .difficulty-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .difficulty-btn {
            padding: 8px 16px;
            border: 2px solid #667eea;
            background: transparent;
            color: #667eea;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .difficulty-btn.active {
            background: #667eea;
            color: white;
        }

        .wpm-chart {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            height: 200px;
            position: relative;
            overflow: hidden;
        }

        .chart-line {
            stroke: #667eea;
            stroke-width: 2;
            fill: none;
        }

        .sound-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .sound-toggle:hover {
            background: rgba(102, 126, 234, 0.1);
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .modal.active .modal-content {
            transform: scale(1);
        }

        .achievement {
            display: inline-block;
            background: linear-gradient(45deg, #ffd700, #ffed4a);
            color: #333;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.8em;
            margin: 2px;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
            
            .title {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="sound-toggle" onclick="toggleSound()">🔊</button>
        
        <div class="header">
            <h1 class="title">TypeMaster Pro</h1>
            <p class="subtitle">Professional Typing Speed Assessment</p>
        </div>

        <div class="controls">
            <button class="btn" onclick="startTest()">Start Test</button>
            <button class="btn secondary" onclick="resetTest()">Reset</button>
            <button class="btn tertiary" onclick="showLeaderboard()">Leaderboard</button>
        </div>

        <div class="difficulty-selector">
            <button class="difficulty-btn active" onclick="setDifficulty('easy')">Easy</button>
            <button class="difficulty-btn" onclick="setDifficulty('medium')">Medium</button>
            <button class="difficulty-btn" onclick="setDifficulty('hard')">Hard</button>
            <button class="difficulty-btn" onclick="setDifficulty('expert')">Expert</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="wpm">0</div>
                <div class="stat-label">WPM</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="accuracy">100%</div>
                <div class="stat-label">Accuracy</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="timer">60</div>
                <div class="stat-label">Time Left</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="errors">0</div>
                <div class="stat-label">Errors</div>
            </div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progress"></div>
        </div>

        <div class="text-display" id="textDisplay"></div>

        <textarea class="input-area" id="textInput" placeholder="Click 'Start Test' to begin typing..." disabled></textarea>

        <div class="wpm-chart" id="wpmChart" style="display: none;">
            <h4 style="text-align: center; margin-bottom: 15px;">WPM Over Time</h4>
            <svg width="100%" height="150" id="chartSvg"></svg>
        </div>

        <div class="leaderboard" id="leaderboard">
            <h3>🏆 Leaderboard</h3>
            <div id="leaderboardEntries"></div>
        </div>
    </div>

    <div class="modal" id="resultsModal">
        <div class="modal-content">
            <h2>Test Complete!</h2>
            <div id="finalStats"></div>
            <div id="achievements"></div>
            <button class="btn" onclick="closeModal()">Close</button>
            <button class="btn secondary" onclick="restartTest()">Try Again</button>
        </div>
    </div>

    <script>
        class TypingTest {
            constructor() {
                this.currentText = '';
                this.currentPosition = 0;
                this.startTime = null;
                this.isActive = false;
                this.timer = null;
                this.timeLeft = 60;
                this.correctChars = 0;
                this.totalChars = 0;
                this.errors = 0;
                this.wpmHistory = [];
                this.soundEnabled = true;
                this.difficulty = 'easy';
                
                this.texts = {
                    easy: [
                        "The quick brown fox jumps over the lazy dog. This is a simple sentence that contains all the letters of the alphabet. It is commonly used for typing practice.",
                        "Today is a beautiful day. The sun is shining brightly in the clear blue sky. Birds are singing in the trees and flowers are blooming in the garden.",
                        "Learning to type faster takes practice and patience. With regular practice, you can improve your typing speed and accuracy significantly over time."
                    ],
                    medium: [
                        "Technology has revolutionized the way we communicate, work, and live. From smartphones to artificial intelligence, these innovations continue to shape our daily experiences in unprecedented ways.",
                        "The importance of sustainable development cannot be overstated in today's world. Climate change, environmental degradation, and resource depletion are challenges that require immediate attention and action.",
                        "Programming languages like JavaScript, Python, and Java have become essential tools for software development. Each language has its own syntax, features, and use cases that make it suitable for different applications."
                    ],
                    hard: [
                        "Quantum computing represents a paradigm shift in computational capabilities, utilizing quantum-mechanical phenomena such as superposition and entanglement to process information in fundamentally different ways than classical computers.",
                        "Neuroplasticity, the brain's ability to reorganize and form new neural connections throughout life, challenges previous assumptions about fixed cognitive capabilities and offers hope for treating various neurological conditions.",
                        "Cryptocurrency and blockchain technology have introduced decentralized financial systems that operate independently of traditional banking institutions, potentially revolutionizing how we think about money and transactions."
                    ],
                    expert: [
                        "The philosophical implications of artificial consciousness raise profound questions about the nature of sentience, self-awareness, and moral responsibility in an era where machines increasingly exhibit human-like cognitive behaviors.",
                        "Epigenetic mechanisms, including DNA methylation and histone modifications, regulate gene expression without altering the underlying DNA sequence, providing a dynamic interface between environmental factors and genetic predisposition.",
                        "Metamorphic testing addresses the oracle problem in software testing by defining metamorphic relations between inputs and outputs, enabling the detection of bugs even when the expected output is unknown or difficult to determine."
                    ]
                };
                
                this.loadLeaderboard();
                this.generateText();
                this.setupEventListeners();
            }

            setupEventListeners() {
                const textInput = document.getElementById('textInput');
                textInput.addEventListener('input', (e) => this.handleInput(e));
                textInput.addEventListener('keydown', (e) => this.handleKeydown(e));
                
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Tab') {
                        e.preventDefault();
                        if (!this.isActive) this.startTest();
                    }
                });
            }

            setDifficulty(level) {
                this.difficulty = level;
                document.querySelectorAll('.difficulty-btn').forEach(btn => btn.classList.remove('active'));
                document.querySelector(`[onclick="setDifficulty('${level}')"]`).classList.add('active');
                this.generateText();
                this.resetTest();
            }

            generateText() {
                const texts = this.texts[this.difficulty];
                this.currentText = texts[Math.floor(Math.random() * texts.length)];
                this.displayText();
            }

            displayText() {
                const textDisplay = document.getElementById('textDisplay');
                textDisplay.innerHTML = this.currentText.split('').map((char, index) => {
                    let className = '';
                    if (index < this.currentPosition) {
                        className = 'correct';
                    } else if (index === this.currentPosition) {
                        className = 'current';
                    }
                    return `<span class="char ${className}">${char === ' ' ? '&nbsp;' : char}</span>`;
                }).join('');
            }

            startTest() {
                this.isActive = true;
                this.startTime = Date.now();
                this.timeLeft = 60;
                this.currentPosition = 0;
                this.correctChars = 0;
                this.totalChars = 0;
                this.errors = 0;
                this.wpmHistory = [];
                
                const textInput = document.getElementById('textInput');
                textInput.disabled = false;
                textInput.value = '';
                textInput.focus();
                textInput.placeholder = 'Type the text above...';
                
                this.generateText();
                this.startTimer();
                this.playSound('start');
                
                document.getElementById('wpmChart').style.display = 'block';
                this.initChart();
            }

            startTimer() {
                this.timer = setInterval(() => {
                    this.timeLeft--;
                    document.getElementById('timer').textContent = this.timeLeft;
                    
                    if (this.timeLeft <= 0) {
                        this.endTest();
                    }
                    
                    // Record WPM every second
                    if (this.isActive) {
                        this.recordWPM();
                    }
                }, 1000);
            }

            recordWPM() {
                const currentWPM = this.calculateWPM();
                this.wpmHistory.push({
                    time: 60 - this.timeLeft,
                    wpm: currentWPM
                });
                this.updateChart();
            }

            initChart() {
                const svg = document.getElementById('chartSvg');
                svg.innerHTML = `
                    <defs>
                        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                `;
            }

            updateChart() {
                if (this.wpmHistory.length < 2) return;
                
                const svg = document.getElementById('chartSvg');
                const width = svg.clientWidth;
                const height = 150;
                const maxWPM = Math.max(...this.wpmHistory.map(h => h.wpm), 60);
                
                const points = this.wpmHistory.map((h, i) => {
                    const x = (h.time / 60) * width;
                    const y = height - (h.wpm / maxWPM) * height;
                    return `${x},${y}`;
                }).join(' ');
                
                svg.innerHTML = `
                    <defs>
                        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    <polyline points="${points}" class="chart-line" stroke="url(#gradient)" />
                `;
            }

            handleInput(e) {
                if (!this.isActive) return;
                
                const input = e.target.value;
                const expectedText = this.currentText.slice(0, input.length);
                
                this.totalChars = input.length;
                this.correctChars = 0;
                this.errors = 0;
                
                // Check each character
                for (let i = 0; i < input.length; i++) {
                    if (i < this.currentText.length && input[i] === this.currentText[i]) {
                        this.correctChars++;
                    } else {
                        this.errors++;
                    }
                }
                
                this.currentPosition = input.length;
                this.updateDisplay();
                
                // Check if test is complete
                if (input.length >= this.currentText.length) {
                    this.endTest();
                }
            }

            handleKeydown(e) {
                if (!this.isActive) return;
                
                // Play sound effects
                if (e.key === 'Backspace') {
                    this.playSound('backspace');
                } else if (e.key.length === 1) {
                    this.playSound('type');
                }
            }

            updateDisplay() {
                // Update text display with correct/incorrect highlighting
                const textDisplay = document.getElementById('textDisplay');
                const input = document.getElementById('textInput').value;
                
                textDisplay.innerHTML = this.currentText.split('').map((char, index) => {
                    let className = '';
                    if (index < input.length) {
                        className = input[index] === char ? 'correct' : 'incorrect';
                    } else if (index === input.length) {
                        className = 'current';
                    }
                    return `<span class="char ${className}">${char === ' ' ? '&nbsp;' : char}</span>`;
                }).join('');
                
                // Update stats
                const wpm = this.calculateWPM();
                const accuracy = this.calculateAccuracy();
                const progress = (this.currentPosition / this.currentText.length) * 100;
                
                document.getElementById('wpm').textContent = Math.round(wpm);
                document.getElementById('accuracy').textContent = Math.round(accuracy) + '%';
                document.getElementById('errors').textContent = this.errors;
                document.getElementById('progress').style.width = progress + '%';
            }

            calculateWPM() {
                if (!this.startTime) return 0;
                const timeElapsed = (Date.now() - this.startTime) / 1000 / 60; // in minutes
                return timeElapsed > 0 ? (this.correctChars / 5) / timeElapsed : 0;
            }

            calculateAccuracy() {
                return this.totalChars > 0 ? (this.correctChars / this.totalChars) * 100 : 100;
            }

            endTest() {
                this.isActive = false;
                clearInterval(this.timer);
                
                const textInput = document.getElementById('textInput');
                textInput.disabled = true;
                
                this.playSound('complete');
                
                const finalWPM = this.calculateWPM();
                const finalAccuracy = this.calculateAccuracy();
                
                this.saveResult(finalWPM, finalAccuracy);
                this.showResults(finalWPM, finalAccuracy);
            }

            saveResult(wpm, accuracy) {
                const result = {
                    wpm: Math.round(wpm),
                    accuracy: Math.round(accuracy),
                    date: new Date().toLocaleDateString(),
                    time: new Date().toLocaleTimeString(),
                    difficulty: this.difficulty,
                    errors: this.errors
                };
                
                let leaderboard = JSON.parse(localStorage.getItem('typingLeaderboard') || '[]');
                leaderboard.push(result);
                leaderboard.sort((a, b) => b.wpm - a.wpm);
                leaderboard = leaderboard.slice(0, 10); // Keep top 10
                
                localStorage.setItem('typingLeaderboard', JSON.stringify(leaderboard));
                this.loadLeaderboard();
            }

            loadLeaderboard() {
                const leaderboard = JSON.parse(localStorage.getItem('typingLeaderboard') || '[]');
                const container = document.getElementById('leaderboardEntries');
                
                if (leaderboard.length === 0) {
                    container.innerHTML = '<p style="text-align: center; color: #666;">No records yet. Take your first test!</p>';
                    return;
                }
                
                container.innerHTML = leaderboard.map((entry, index) => `
                    <div class="leaderboard-entry">
                        <div>
                            <strong>#${index + 1}</strong>
                            <span style="margin-left: 10px;">${entry.date}</span>
                            <span class="achievement">${entry.difficulty.toUpperCase()}</span>
                        </div>
                        <div>
                            <strong>${entry.wpm} WPM</strong>
                            <span style="margin-left: 10px;">${entry.accuracy}%</span>
                        </div>
                    </div>
                `).join('');
            }

            showResults(wpm, accuracy) {
                const achievements = this.getAchievements(wpm, accuracy);
                
                document.getElementById('finalStats').innerHTML = `
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0;">
                        <div>
                            <h3>${Math.round(wpm)} WPM</h3>
                            <p>Words Per Minute</p>
                        </div>
                        <div>
                            <h3>${Math.round(accuracy)}%</h3>
                            <p>Accuracy</p>
                        </div>
                    </div>
                    <p>Difficulty: <strong>${this.difficulty.toUpperCase()}</strong></p>
                    <p>Errors: <strong>${this.errors}</strong></p>
                `;
                
                document.getElementById('achievements').innerHTML = achievements.length > 0 
                    ? `<div style="margin-top: 20px;"><h4>🏆 Achievements</h4>${achievements.map(a => `<span class="achievement">${a}</span>`).join('')}</div>`
                    : '';
                
                document.getElementById('resultsModal').classList.add('active');
            }

            getAchievements(wpm, accuracy) {
                const achievements = [];
                
                if (wpm >= 40) achievements.push('Speed Demon');
                if (wpm >= 60) achievements.push('Lightning Fast');
                if (wpm >= 80) achievements.push('Typing Master');
                if (wpm >= 100) achievements.push('Superhuman');
                
                if (accuracy >= 95) achievements.push('Precision Pro');
                if (accuracy >= 98) achievements.push('Perfectionist');
                if (accuracy === 100) achievements.push('Flawless');
                
                if (this.errors === 0) achievements.push('Error-Free');
                if (this.difficulty === 'expert') achievements.push('Expert Level');
                
                return achievements;
            }

            resetTest() {
                this.isActive = false;
                clearInterval(this.timer);
                
                this.currentPosition = 0;
                this.timeLeft = 60;
                this.correctChars = 0;
                this.totalChars = 0;
                this.errors = 0;
                this.wpmHistory = [];
                
                const textInput = document.getElementById('textInput');
                textInput.disabled = true;
                textInput.value = '';
                textInput.placeholder = 'Click "Start Test" to begin typing...';
                
                document.getElementById('wpm').textContent = '0';
                document.getElementById('accuracy').textContent = '100%';
                document.getElementById('timer').textContent = '60';
                document.getElementById('errors').textContent = '0';
                document.getElementById('progress').style.width = '0%';
                document.getElementById('wpmChart').style.display = 'none';
                
                this.generateText();
            }

            playSound(type) {
                if (!this.soundEnabled) return;
                
                const context = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = context.createOscillator();
                const gainNode = context.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(context.destination);
                
                gainNode.gain.setValueAtTime(0.1, context.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 0.1);
                
                switch(type) {
                    case 'type':
                        oscillator.frequency.value = 800;
                        break;
                    case 'backspace':
                        oscillator.frequency.value = 400;
                        break;
                    case 'start':
                        oscillator.frequency.value = 1000;
                        break;
                    case 'complete':
                        oscillator.frequency.value = 1200;
                        break;
                }
                
                oscillator.start();
                oscillator.stop(context.currentTime + 0.1);
            }

            toggleSound() {
                this.soundEnabled = !this.soundEnabled;
                document.querySelector('.sound-toggle').textContent = this.soundEnabled ? '🔊' : '🔇';
            }

            showLeaderboard() {
                document.getElementById('leaderboard').scrollIntoView({ behavior: 'smooth' });
            }

            closeModal() {
                document.getElementById('resultsModal').classList.remove('active');
            }

            restartTest() {
                this.closeModal();
                this.resetTest();
                setTimeout(() => this.startTest(), 100);
            }
        }

        // Initialize the typing test
        const typingTest = new TypingTest();

        // Global functions for button clicks
        function startTest() {
            typingTest.startTest();
        }

        function resetTest() {
            typingTest.resetTest();
        }

        function setDifficulty(level) {
            typingTest.setDifficulty(level);
        }

        function toggleSound() {
            typingTest.toggleSound();
        }

        function showLeaderboard() {
            typingTest.showLeaderboard();
        }

        function closeModal() {
            typingTest.closeModal();
        }

        function restartTest() {
            typingTest.restartTest();
        }

        // Additional features for professional touch
        document.addEventListener('DOMContentLoaded', function() {
            // Add subtle animations on load
            const elements = document.querySelectorAll('.stat-card, .btn, .text-display');
            elements.forEach((el, index) => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(20px)';
                setTimeout(() => {
                    el.style.transition = 'all 0.6s ease';
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                }, index * 100);
            });

            // Add keyboard shortcuts info
            const shortcuts = document.createElement('div');
            shortcuts.style.cssText = `
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: rgba(255, 255, 255, 0.9);
                padding: 15px;
                border-radius: 10px;
                font-size: 0.8em;
                color: #666;
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.3);
                max-width: 200px;
            `;
            shortcuts.innerHTML = `
                <strong>Shortcuts:</strong><br>
                Tab - Start Test<br>
                Esc - Reset Test<br>
                Space - Pause/Resume
            `;
            document.body.appendChild(shortcuts);

            // Add escape key functionality
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && typingTest.isActive) {
                    typingTest.resetTest();
                }
            });

            // Add focus management
            document.addEventListener('click', (e) => {
                if (typingTest.isActive && !e.target.closest('.input-area')) {
                    document.getElementById('textInput').focus();
                }
            });

            // Add responsive design enhancements
            const mediaQuery = window.matchMedia('(max-width: 768px)');
            function handleMobile(e) {
                if (e.matches) {
                    shortcuts.style.display = 'none';
                } else {
                    shortcuts.style.display = 'block';
                }
            }
            handleMobile(mediaQuery);
            mediaQuery.addListener(handleMobile);

            // Add performance monitoring
            let lastFrameTime = performance.now();
            function monitorPerformance() {
                const now = performance.now();
                const fps = 1000 / (now - lastFrameTime);
                lastFrameTime = now;
                
                if (fps < 30 && typingTest.isActive) {
                    console.warn('Performance warning: FPS below 30');
                }
                
                requestAnimationFrame(monitorPerformance);
            }
            monitorPerformance();

            // Add auto-save functionality
            setInterval(() => {
                if (typingTest.isActive) {
                    const state = {
                        currentPosition: typingTest.currentPosition,
                        correctChars: typingTest.correctChars,
                        totalChars: typingTest.totalChars,
                        errors: typingTest.errors,
                        timeLeft: typingTest.timeLeft,
                        wpmHistory: typingTest.wpmHistory
                    };
                    sessionStorage.setItem('typingTestState', JSON.stringify(state));
                }
            }, 1000);

            // Add theme switching capability
            const themeToggle = document.createElement('button');
            themeToggle.style.cssText = `
                position: absolute;
                top: 20px;
                left: 20px;
                background: rgba(255, 255, 255, 0.9);
                border: none;
                padding: 10px;
                border-radius: 50%;
                cursor: pointer;
                font-size: 18px;
                transition: all 0.3s ease;
            `;
            themeToggle.innerHTML = '🌙';
            themeToggle.onclick = () => {
                document.body.classList.toggle('dark-theme');
                themeToggle.innerHTML = document.body.classList.contains('dark-theme') ? '☀️' : '🌙';
            };
            document.querySelector('.container').appendChild(themeToggle);

            // Add dark theme styles
            const darkThemeStyles = document.createElement('style');
            darkThemeStyles.textContent = `
                body.dark-theme {
                    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
                }
                
                body.dark-theme .container {
                    background: rgba(30, 30, 30, 0.95);
                    color: #e0e0e0;
                }
                
                body.dark-theme .text-display {
                    background: rgba(40, 40, 40, 0.9);
                    color: #e0e0e0;
                }
                
                body.dark-theme .input-area {
                    background: rgba(40, 40, 40, 0.9);
                    color: #e0e0e0;
                    border-color: rgba(102, 126, 234, 0.5);
                }
                
                body.dark-theme .stat-card {
                    background: rgba(40, 40, 40, 0.8);
                    color: #e0e0e0;
                }
                
                body.dark-theme .leaderboard {
                    background: rgba(40, 40, 40, 0.9);
                    color: #e0e0e0;
                }
                
                body.dark-theme .leaderboard-entry {
                    background: rgba(50, 50, 50, 0.7);
                    color: #e0e0e0;
                }
                
                body.dark-theme .modal-content {
                    background: #2a2a2a;
                    color: #e0e0e0;
                }
            `;
            document.head.appendChild(darkThemeStyles);

            // Add accessibility features
            document.addEventListener('keydown', (e) => {
                if (e.altKey && e.key === 'Enter') {
                    // Alt+Enter to start test (accessibility)
                    if (!typingTest.isActive) {
                        typingTest.startTest();
                    }
                }
            });

            // Add high contrast mode
            const contrastToggle = document.createElement('button');
            contrastToggle.style.cssText = `
                position: absolute;
                top: 70px;
                left: 20px;
                background: rgba(255, 255, 255, 0.9);
                border: none;
                padding: 10px;
                border-radius: 50%;
                cursor: pointer;
                font-size: 18px;
                transition: all 0.3s ease;
            `;
            contrastToggle.innerHTML = '🔳';
            contrastToggle.onclick = () => {
                document.body.classList.toggle('high-contrast');
            };
            document.querySelector('.container').appendChild(contrastToggle);

            // Add high contrast styles
            const highContrastStyles = document.createElement('style');
            highContrastStyles.textContent = `
                body.high-contrast {
                    background: #000000 !important;
                    color: #ffffff !important;
                }
                
                body.high-contrast .container {
                    background: #000000 !important;
                    border: 2px solid #ffffff !important;
                }
                
                body.high-contrast .btn {
                    background: #ffffff !important;
                    color: #000000 !important;
                    border: 2px solid #ffffff !important;
                }
                
                body.high-contrast .text-display {
                    background: #000000 !important;
                    color: #ffffff !important;
                    border: 2px solid #ffffff !important;
                }
                
                body.high-contrast .char.correct {
                    background-color: #00ff00 !important;
                    color: #000000 !important;
                }
                
                body.high-contrast .char.incorrect {
                    background-color: #ff0000 !important;
                    color: #ffffff !important;
                }
                
                body.high-contrast .char.current {
                    background-color: #ffff00 !important;
                    color: #000000 !important;
                }
            `;
            document.head.appendChild(highContrastStyles);

            // Add focus indicators for better accessibility
            const focusStyles = document.createElement('style');
            focusStyles.textContent = `
                .btn:focus,
                .difficulty-btn:focus,
                .input-area:focus {
                    outline: 3px solid #667eea !important;
                    outline-offset: 2px !important;
                }
                
                .btn:focus-visible,
                .difficulty-btn:focus-visible {
                    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.5) !important;
                }
            `;
            document.head.appendChild(focusStyles);
        });
    </script>
