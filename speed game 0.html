<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Typing Speed Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 1200px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .title {
            font-size: 2.5rem;
            color: #2c3e50;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .subtitle {
            color: #7f8c8d;
            font-size: 1.1rem;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .control-group label {
            font-weight: 600;
            color: #34495e;
            margin-bottom: 5px;
        }

        select, button {
            padding: 10px 20px;
            border: 2px solid #3498db;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        select {
            background: white;
            color: #2c3e50;
        }

        button {
            background: #3498db;
            color: white;
            border: none;
            font-weight: 600;
        }

        button:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }

        button:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            transform: none;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #dee2e6;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #6c757d;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .typing-area {
            margin-bottom: 30px;
        }

        .text-display {
            background: #f8f9fa;
            border: 2px solid #dee2e6;
            border-radius: 12px;
            padding: 25px;
            font-size: 1.2rem;
            line-height: 1.8;
            font-family: 'Consolas', 'Monaco', monospace;
            margin-bottom: 20px;
            min-height: 120px;
            position: relative;
        }

        .char {
            position: relative;
        }

        .char.correct {
            background: #d4edda;
            color: #155724;
        }

        .char.incorrect {
            background: #f8d7da;
            color: #721c24;
        }

        .char.current {
            background: #fff3cd;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.3; }
        }

        .input-area {
            width: 100%;
            padding: 15px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 1.1rem;
            font-family: 'Consolas', 'Monaco', monospace;
            resize: none;
            transition: border-color 0.3s ease;
        }

        .input-area:focus {
            outline: none;
            border-color: #3498db;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3498db, #2ecc71);
            width: 0%;
            transition: width 0.3s ease;
        }

        .leaderboard {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 25px;
            border: 1px solid #dee2e6;
        }

        .leaderboard-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 20px;
            text-align: center;
        }

        .leaderboard-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: white;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid #dee2e6;
        }

        .leaderboard-entry:nth-child(2) {
            border-left: 4px solid #f39c12;
        }

        .leaderboard-entry:nth-child(3) {
            border-left: 4px solid #c0392b;
        }

        .leaderboard-entry:nth-child(4) {
            border-left: 4px solid #27ae60;
        }

        .entry-rank {
            font-weight: 700;
            color: #2c3e50;
            font-size: 1.1rem;
        }

        .entry-details {
            display: flex;
            gap: 20px;
        }

        .entry-stat {
            font-size: 0.9rem;
            color: #6c757d;
        }

        .real-time-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .mini-stat {
            background: rgba(52, 152, 219, 0.1);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }

        .mini-stat-value {
            font-size: 1.2rem;
            font-weight: 600;
            color: #2c3e50;
        }

        .mini-stat-label {
            font-size: 0.8rem;
            color: #7f8c8d;
        }

        .achievement {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            margin: 5px;
            display: inline-block;
            font-size: 0.9rem;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .difficulty-indicator {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-bottom: 20px;
        }

        .difficulty-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #dee2e6;
            transition: all 0.3s ease;
        }

        .difficulty-dot.active {
            background: #3498db;
            transform: scale(1.2);
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: 2px solid #3498db;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            background: #3498db;
            color: white;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            .title {
                font-size: 2rem;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .controls {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
        
        <div class="header">
            <h1 class="title">Professional Typing Speed Test</h1>
            <p class="subtitle">Test your typing speed and accuracy with advanced analytics</p>
        </div>

        <div class="controls">
            <div class="control-group">
                <label for="difficulty">Difficulty</label>
                <select id="difficulty" onchange="changeDifficulty()">
                    <option value="easy">Easy</option>
                    <option value="medium" selected>Medium</option>
                    <option value="hard">Hard</option>
                    <option value="expert">Expert</option>
                </select>
            </div>
            <div class="control-group">
                <label for="duration">Duration</label>
                <select id="duration" onchange="changeDuration()">
                    <option value="30">30 seconds</option>
                    <option value="60" selected>1 minute</option>
                    <option value="120">2 minutes</option>
                    <option value="300">5 minutes</option>
                </select>
            </div>
            <div class="control-group">
                <label>&nbsp;</label>
                <button onclick="startTest()" id="startBtn">Start Test</button>
            </div>
        </div>

        <div class="difficulty-indicator" id="difficultyIndicator"></div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="wpm">0</div>
                <div class="stat-label">WPM</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="accuracy">100%</div>
                <div class="stat-label">Accuracy</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="timer">60</div>
                <div class="stat-label">Time Left</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="characters">0</div>
                <div class="stat-label">Characters</div>
            </div>
        </div>

        <div class="real-time-stats">
            <div class="mini-stat">
                <div class="mini-stat-value" id="realTimeWpm">0</div>
                <div class="mini-stat-label">Current WPM</div>
            </div>
            <div class="mini-stat">
                <div class="mini-stat-value" id="keystrokesPerMin">0</div>
                <div class="mini-stat-label">Keystrokes/Min</div>
            </div>
            <div class="mini-stat">
                <div class="mini-stat-value" id="errorRate">0%</div>
                <div class="mini-stat-label">Error Rate</div>
            </div>
            <div class="mini-stat">
                <div class="mini-stat-value" id="consistency">100%</div>
                <div class="mini-stat-label">Consistency</div>
            </div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="typing-area">
            <div class="text-display" id="textDisplay"></div>
            <textarea class="input-area" id="userInput" placeholder="Click Start Test to begin..." disabled></textarea>
        </div>

        <div id="achievements"></div>

        <div class="leaderboard">
            <h2 class="leaderboard-title">🏆 Leaderboard</h2>
            <div id="leaderboardEntries"></div>
        </div>
    </div>

    <script>
        class TypingSpeedTest {
            constructor() {
                this.texts = {
                    easy: [
                        "The quick brown fox jumps over the lazy dog. This is a simple sentence that contains all letters of the alphabet.",
                        "Today is a beautiful day. The sun is shining and the birds are singing in the trees.",
                        "I love to read books and learn new things every day. Knowledge is power and learning never stops."
                    ],
                    medium: [
                        "Technology has revolutionized the way we communicate, work, and live our daily lives. From smartphones to artificial intelligence, innovation continues to shape our future.",
                        "The art of programming requires logical thinking, creativity, and attention to detail. Debugging code can be challenging but also rewarding when you solve complex problems.",
                        "Climate change is one of the most pressing issues of our time. We must take action to reduce carbon emissions and protect our planet for future generations."
                    ],
                    hard: [
                        "Quantum computing represents a paradigm shift in computational capabilities, leveraging quantum mechanical phenomena such as superposition and entanglement to process information exponentially faster than classical computers.",
                        "The intricacies of molecular biology reveal the fascinating mechanisms by which DNA replication, protein synthesis, and cellular metabolism orchestrate the complex symphony of life itself.",
                        "Cryptocurrency and blockchain technology have introduced decentralized financial systems that challenge traditional banking paradigms while raising questions about regulatory frameworks and economic stability."
                    ],
                    expert: [
                        "The phenomenological approach to consciousness studies emphasizes the subjective, first-person experience of mental states, distinguishing between the intentional structure of consciousness and its qualitative characteristics.",
                        "Algorithmic complexity theory investigates the computational resources required to solve problems, distinguishing between polynomial-time algorithms and those belonging to the NP-complete class.",
                        "Neuroplasticity research demonstrates the brain's remarkable capacity for reorganization throughout life, challenging previously held beliefs about the immutability of neural pathways and cognitive function."
                    ]
                };
                
                this.currentText = '';
                this.currentIndex = 0;
                this.startTime = null;
                this.endTime = null;
                this.isActive = false;
                this.duration = 60;
                this.difficulty = 'medium';
                this.timeLeft = 60;
                this.errors = 0;
                this.totalChars = 0;
                this.keystrokeHistory = [];
                this.wpmHistory = [];
                this.currentWpm = 0;
                
                this.initializeElements();
                this.setupEventListeners();
                this.loadLeaderboard();
                this.generateNewText();
                this.updateDifficultyIndicator();
            }

            initializeElements() {
                this.textDisplay = document.getElementById('textDisplay');
                this.userInput = document.getElementById('userInput');
                this.startBtn = document.getElementById('startBtn');
                this.wpmDisplay = document.getElementById('wpm');
                this.accuracyDisplay = document.getElementById('accuracy');
                this.timerDisplay = document.getElementById('timer');
                this.charactersDisplay = document.getElementById('characters');
                this.progressFill = document.getElementById('progressFill');
                this.leaderboardEntries = document.getElementById('leaderboardEntries');
                this.realTimeWpm = document.getElementById('realTimeWpm');
                this.keystrokesPerMin = document.getElementById('keystrokesPerMin');
                this.errorRate = document.getElementById('errorRate');
                this.consistency = document.getElementById('consistency');
                this.achievements = document.getElementById('achievements');
                this.difficultyIndicator = document.getElementById('difficultyIndicator');
            }

            setupEventListeners() {
                this.userInput.addEventListener('input', () => this.handleInput());
                this.userInput.addEventListener('paste', (e) => e.preventDefault());
                document.addEventListener('keydown', (e) => {
                    if (this.isActive && e.key.length === 1) {
                        this.keystrokeHistory.push(Date.now());
                    }
                });
            }

            generateNewText() {
                const texts = this.texts[this.difficulty];
                this.currentText = texts[Math.floor(Math.random() * texts.length)];
                this.displayText();
            }

            displayText() {
                this.textDisplay.innerHTML = this.currentText
                    .split('')
                    .map((char, index) => `<span class="char" data-index="${index}">${char}</span>`)
                    .join('');
            }

            startTest() {
                this.isActive = true;
                this.startTime = Date.now();
                this.currentIndex = 0;
                this.errors = 0;
                this.totalChars = 0;
                this.keystrokeHistory = [];
                this.wpmHistory = [];
                this.timeLeft = this.duration;
                
                this.userInput.disabled = false;
                this.userInput.value = '';
                this.userInput.focus();
                this.startBtn.disabled = true;
                this.startBtn.textContent = 'Test in Progress...';
                
                this.generateNewText();
                this.timer = setInterval(() => this.updateTimer(), 1000);
                this.statsTimer = setInterval(() => this.updateRealTimeStats(), 100);
            }

            handleInput() {
                if (!this.isActive) return;
                
                const inputText = this.userInput.value;
                const currentChar = this.currentText[this.currentIndex];
                
                if (inputText.length > this.currentIndex + 1) {
                    this.userInput.value = inputText.slice(0, this.currentIndex + 1);
                    return;
                }
                
                this.updateDisplay(inputText);
                this.updateStats();
                
                if (this.currentIndex >= this.currentText.length) {
                    this.generateNewText();
                    this.currentIndex = 0;
                    this.userInput.value = '';
                }
            }

            updateDisplay(inputText) {
                const chars = this.textDisplay.querySelectorAll('.char');
                
                chars.forEach((char, index) => {
                    char.className = 'char';
                    if (index < inputText.length) {
                        if (inputText[index] === this.currentText[index]) {
                            char.classList.add('correct');
                            if (index >= this.currentIndex) {
                                this.currentIndex = index + 1;
                            }
                        } else {
                            char.classList.add('incorrect');
                            if (index >= this.currentIndex) {
                                this.errors++;
                                this.currentIndex = index + 1;
                            }
                        }
                    } else if (index === inputText.length) {
                        char.classList.add('current');
                    }
                });
                
                this.totalChars = Math.max(this.totalChars, inputText.length);
            }

            updateStats() {
                if (!this.startTime) return;
                
                const elapsed = (Date.now() - this.startTime) / 1000 / 60;
                const wordsTyped = this.totalChars / 5;
                const wpm = Math.round(wordsTyped / elapsed) || 0;
                const accuracy = this.totalChars > 0 ? Math.round(((this.totalChars - this.errors) / this.totalChars) * 100) : 100;
                
                this.wpmDisplay.textContent = wpm;
                this.accuracyDisplay.textContent = accuracy + '%';
                this.charactersDisplay.textContent = this.totalChars;
                
                const progress = (this.totalChars / this.currentText.length) * 100;
                this.progressFill.style.width = Math.min(progress, 100) + '%';
                
                this.currentWpm = wpm;
                this.checkAchievements(wpm, accuracy);
            }

            updateRealTimeStats() {
                if (!this.isActive) return;
                
                const now = Date.now();
                const recentKeystrokes = this.keystrokeHistory.filter(time => now - time < 60000);
                const keystrokesPerMin = recentKeystrokes.length;
                
                this.realTimeWpm.textContent = this.currentWpm;
                this.keystrokesPerMin.textContent = keystrokesPerMin;
                this.errorRate.textContent = this.totalChars > 0 ? Math.round((this.errors / this.totalChars) * 100) + '%' : '0%';
                
                // Calculate consistency based on WPM variation
                this.wpmHistory.push(this.currentWpm);
                if (this.wpmHistory.length > 10) this.wpmHistory.shift();
                
                if (this.wpmHistory.length > 1) {
                    const avg = this.wpmHistory.reduce((a, b) => a + b, 0) / this.wpmHistory.length;
                    const variance = this.wpmHistory.reduce((acc, val) => acc + Math.pow(val - avg, 2), 0) / this.wpmHistory.length;
                    const consistency = Math.max(0, Math.round(100 - Math.sqrt(variance)));
                    this.consistency.textContent = consistency + '%';
                }
            }

            updateTimer() {
                this.timeLeft--;
                this.timerDisplay.textContent = this.timeLeft;
                
                if (this.timeLeft <= 0) {
                    this.endTest();
                }
            }

            endTest() {
                this.isActive = false;
                this.endTime = Date.now();
                
                clearInterval(this.timer);
                clearInterval(this.statsTimer);
                
                this.userInput.disabled = true;
                this.startBtn.disabled = false;
                this.startBtn.textContent = 'Start Test';
                
                this.saveToLeaderboard();
                this.showFinalAchievements();
            }

            saveToLeaderboard() {
                const wpm = parseInt(this.wpmDisplay.textContent);
                const accuracy = parseInt(this.accuracyDisplay.textContent);
                const characters = parseInt(this.charactersDisplay.textContent);
                
                const entry = {
                    wpm,
                    accuracy,
                    characters,
                    difficulty: this.difficulty,
                    duration: this.duration,
                    date: new Date().toLocaleDateString(),
                    timestamp: Date.now()
                };
                
                let leaderboard = JSON.parse(localStorage.getItem('typingLeaderboard') || '[]');
                leaderboard.push(entry);
                leaderboard.sort((a, b) => b.wpm - a.wpm);
                leaderboard = leaderboard.slice(0, 10);
                
                localStorage.setItem('typingLeaderboard', JSON.stringify(leaderboard));
                this.loadLeaderboard();
            }

            loadLeaderboard() {
                const leaderboard = JSON.parse(localStorage.getItem('typingLeaderboard') || '[]');
                
                if (leaderboard.length === 0) {
                    this.leaderboardEntries.innerHTML = '<div style="text-align: center; color: #6c757d;">No results yet. Start typing to see your scores!</div>';
                    return;
                }
                
                this.leaderboardEntries.innerHTML = leaderboard.map((entry, index) => `
                    <div class="leaderboard-entry">
                        <span class="entry-rank">#${index + 1}</span>
                        <div class="entry-details">
                            <span class="entry-stat">${entry.wpm} WPM</span>
                            <span class="entry-stat">${entry.accuracy}% Accuracy</span>
                            <span class="entry-stat">${entry.characters} Characters</span>
                            <span class="entry-stat">${entry.difficulty}</span>
                            <span class="entry-stat">${entry.date}</span>
                        </div>
                    </div>
                `).join('');
            }

            checkAchievements(wpm, accuracy) {
                const achievements = [];
                
                if (wpm >= 40 && !this.hasAchievement('speed40')) {
                    achievements.push('Speed Demon - 40 WPM! 🚀');
                    this.addAchievement('speed40');
                }
                
                if (wpm >= 60 && !this.hasAchievement('speed60')) {
                    achievements.push('Lightning Fast - 60 WPM! ⚡');
                    this.addAchievement('speed60');
                }
                
                if (wpm >= 80 && !this.hasAchievement('speed80')) {
                    achievements.push('Typing Master - 80 WPM! 🏆');
                    this.addAchievement('speed80');
                }
                
                if (accuracy >= 95 && !this.hasAchievement('accuracy95')) {
                    achievements.push('Precision Expert - 95% Accuracy! 🎯');
                    this.addAchievement('accuracy95');
                }
                
                if (accuracy === 100 && this.totalChars > 50 && !this.hasAchievement('perfect')) {
                    achievements.push('Perfect Score - 100% Accuracy! 💯');
                    this.addAchievement('perfect');
                }
                
                achievements.forEach(achievement => {
                    const div = document.createElement('div');
                    div.className = 'achievement';
                    div.textContent = achievement;
                    this.achievements.appendChild(div);
                    
                    setTimeout(() => {
                        if (div.parentNode) {
                            div.parentNode.removeChild(div);
                        }
                    }, 3000);
                });
            }

            hasAchievement(key) {
                const achievements = JSON.parse(localStorage.getItem('typingAchievements') || '[]');
                return achievements.includes(key);
            }

            addAchievement(key) {
                const achievements = JSON.parse(localStorage.getItem('typingAchievements') || '[]');
                achievements.push(key);
                localStorage.setItem('typingAchievements', JSON.stringify(achievements));
            }

            showFinalAchievements() {
                const wpm = parseInt(this.wpmDisplay.textContent);
                const accuracy = parseInt(this.accuracyDisplay.textContent);
                
                setTimeout(() => {
                    if (wpm >= 100) {
                        this.showAchievement('🏆 LEGENDARY TYPIST! 100+ WPM!');
                    } else if (wpm >= 80) {
                        this.showAchievement('🥇 EXPERT LEVEL! 80+ WPM!');
                    } else if (wpm >= 60) {
                        this.showAchievement('🥈 ADVANCED TYPIST! 60+ WPM!');
                    } else if (wpm >= 40) {
                        this.showAchievement('🥉 GOOD PROGRESS! 40+ WPM!');
                    }
                }, 1000);
            }

            showAchievement(text) {
                const div = document.createElement('div');
                div.className = 'achievement';
                div.textContent = text;
                this.achievements.appendChild(div);
                
                setTimeout(() => {
                    if (div.parentNode) {
                        div.parentNode.removeChild(div);
                    }
                }, 4000);
            }

            changeDifficulty() {
                this.difficulty = document.getElementById('difficulty').value;
                this.generateNewText();
                this.updateDifficultyIndicator();
            }

            changeDuration() {
                this.duration = parseInt(document.getElementById('duration').value);
                this.timeLeft = this.duration;
                this.timerDisplay.textContent = this.timeLeft;
            }

            updateDifficultyIndicator() {
                const levels = ['easy', 'medium', 'hard', 'expert'];
                const currentLevel = levels.indexOf(this.difficulty);
                
                this.difficultyIndicator.innerHTML = levels.map((level, index) => 
                    `<div class="difficulty-dot ${index <= currentLevel ? 'active' : ''}"></div>`
                ).join('');
            }
        }

        // Initialize the typing test
        let typingTest;
        document.addEventListener('DOMContentLoaded', () => {
            typingTest = new TypingSpeedTest();
        });

        // Global functions for HTML event handlers
        function startTest() {
            typingTest.startTest();
        }

        function changeDifficulty() {
            typingTest.changeDifficulty();
        }

        function changeDuration() {
            typingTest.changeDuration();
        }

        function toggleTheme() {
            document.body.style.filter = document.body.style.filter === 'invert(1) hue-rotate(180deg)' ? '' : 'invert(1) hue-rotate(180deg)';
        }
    </script>
